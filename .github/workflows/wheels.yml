name: build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    paths:
      - setup.py
      - pyproject.toml
      - MANIFEST.in
      - 'endf_userpy/fortran/**'
      - .github/workflows/wheels.yml

jobs:
  build_wheels:
    name: ${{ matrix.os }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up gfortran on host (macOS, Windows)
        if: runner.os != 'Linux'
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc
          version: 13

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build sdist
        run: |
          pip install --upgrade build
          python -m build --sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only on tag push - keeps workflow_dispatch and PR runs from
    # publishing.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/endf-userpy
    permissions:
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - name: Download all artifacts into dist/
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
